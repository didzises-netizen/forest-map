<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Forest Road Mapper</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
html,body{
    margin:0;
    height:100%;
}

#map{
    width:100%;
    height:100%;
}

.toolbar{
    position:absolute;
    top:10px;
    right:10px;
    z-index:1000;
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    display:flex;
    flex-direction:column;
    gap:5px;
    min-width:180px;
}

.toolbar button{
    width:100%;
}

#coords{
    margin-top:5px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="toolbar">

<button onclick="roadType='good'">Braucama</button>
<button onclick="roadType='bad'">Slikti braucama</button>
<button onclick="roadType='blocked'">Neizbraucama</button>
<button onclick="addRoadEnd()">Ceļa gals</button>
<button onclick="addPhotoPoint()">Foto punkts</button>
<button onclick="exportGeoJSON()">Saglabāt GeoJSON</button>

<div id="coords"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>

const map = L.map('map').setView([56.504,21.01],13);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom:19 }
).addTo(map);

let roadType = "good";

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

/* ---------------- SAVE ---------------- */

function saveData(){
    const geojson = drawnItems.toGeoJSON();
    localStorage.setItem("forest_data", JSON.stringify(geojson));
}

/* ---------------- LOAD ---------------- */

function loadData(){

    const saved = localStorage.getItem("forest_data");
    if(!saved) return;

    const geojson = JSON.parse(saved);

    L.geoJSON(geojson, {

        style: function(feature){

            if(feature.properties.roadType==="good")
                return {color:"green",weight:5};

            if(feature.properties.roadType==="bad")
                return {color:"orange",weight:5};

            if(feature.properties.roadType==="blocked")
                return {color:"red",weight:5};

        },

        pointToLayer: function(feature, latlng){

            if(feature.properties.type==="road_end"){
                return L.circleMarker(latlng,{
                    radius:8,
                    color:"black",
                    fillColor:"black",
                    fillOpacity:1
                });
            }

            if(feature.properties.type==="photo"){

                const m = L.marker(latlng);

                const img = feature.properties.imageData || "";

                m.bindPopup(
                    `<img src="${img}" width="250"><br>${feature.properties.filename||""}`
                );

                return m;
            }

            return L.marker(latlng);
        }

    }).eachLayer(layer=>{
        drawnItems.addLayer(layer);
    });
}

loadData();

/* ---------------- DRAW CONTROL ---------------- */

const drawControl = new L.Control.Draw({
edit:{ featureGroup:drawnItems },
draw:{
polygon:false,
rectangle:false,
circle:false,
marker:false,
circlemarker:false
}
});

map.addControl(drawControl);

map.on('mousemove',e=>{
document.getElementById('coords').innerHTML =
e.latlng.lat.toFixed(6)+", "+e.latlng.lng.toFixed(6);
});

/* ---------------- CREATE LINES ---------------- */

map.on(L.Draw.Event.CREATED,function(e){

const layer = e.layer;

let color="green";
if(roadType==="bad") color="orange";
if(roadType==="blocked") color="red";

layer.setStyle({color,weight:5});

layer.feature={
type:"Feature",
properties:{ roadType }
};

drawnItems.addLayer(layer);
saveData();

});

/* ---------------- ROAD END ---------------- */

function addRoadEnd(){

alert("Klikšķini kartē");

map.once("click",function(e){

const marker = L.circleMarker(e.latlng,{
radius:8,
color:"black",
fillColor:"black",
fillOpacity:1
});

marker.feature={
type:"Feature",
properties:{ type:"road_end" }
};

drawnItems.addLayer(marker);
saveData();

});

}

/* ---------------- PHOTO ---------------- */

function addPhotoPoint(){

alert("Klikšķini kartē");

map.once("click",function(e){

const input=document.createElement("input");
input.type="file";
input.accept="image/*";

input.onchange=function(){

const file=input.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(ev){

const marker = L.marker(e.latlng);

marker.bindPopup(
`<img src="${ev.target.result}" width="250"><br>${file.name}`
);

marker.feature={
type:"Feature",
properties:{
type:"photo",
filename:file.name,
imageData:ev.target.result
}
};

drawnItems.addLayer(marker);
saveData();

};

reader.readAsDataURL(file);

};

input.click();

});

}

/* ---------------- EXPORT ---------------- */

function exportGeoJSON(){

const geojson = drawnItems.toGeoJSON();

const data =
"data:text/json;charset=utf-8,"+
encodeURIComponent(JSON.stringify(geojson,null,2));

const a=document.createElement("a");
a.href=data;
a.download="forest_data.geojson";
a.click();

}

/* ---------------- AUTO SAVE ON EDIT ---------------- */

map.on(L.Draw.Event.EDITED, saveData);
map.on(L.Draw.Event.DELETED, saveData);

</script>

</body>
</html>
