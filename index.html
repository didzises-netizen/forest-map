<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Forest Map PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
body,html{margin:0;height:100%}
#map{height:100%}

/* TOOLBAR */
.toolbar{
position:absolute;
top:10px;
right:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:10px;
width:260px;
}

button,input{
width:100%;
margin:5px 0;
padding:12px;
font-size:16px;
}

/* 🔥 MOBILE DRAW CONTROLS */
.leaflet-draw{
position:absolute !important;
left:10px !important;
top:120px !important;
}

.leaflet-draw-toolbar a{
width:44px !important;
height:44px !important;
line-height:44px !important;
font-size:20px !important;
}
</style>
</head>

<body>

<div class="toolbar">

<button onclick="mode='good'">Braucams</button>
<button onclick="mode='bad'">Slikts</button>
<button onclick="mode='blocked'">Bloķēts</button>

<button onclick="addImage()">Pievienot bildi</button>

<button onclick="exportGeo()">Export GeoJSON</button>

<button onclick="document.getElementById('geoInput').click()">Upload GeoJSON</button>

<button onclick="deleteAll()">🗑 Dzēst visu</button>

<input type="file" id="imgInput">
<input type="file" id="geoInput" accept=".json,.geojson" style="display:none">

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
const map=L.map('map').setView([56.5,21],13);

// LAYERS
const topo=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Topo50",
format:"image/png",
maxZoom:19
});

const ortho=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Ortofoto",
format:"image/png",
maxZoom:19
});

topo.addTo(map);

L.control.layers({
"Topo karte": topo,
"Ortofoto": ortho
}).addTo(map);

// DRAW
let mode="good";

const drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl=new L.Control.Draw({
position:'topleft', // 🔥 pa kreisi
edit:{featureGroup:drawnItems},
draw:{
polygon:true,
polyline:true,
rectangle:false,
circle:false,
marker:false
}
});
map.addControl(drawControl);

// CREATE
map.on(L.Draw.Event.CREATED,e=>{
const l=e.layer;

let color="green";
if(mode==="bad") color="orange";
if(mode==="blocked") color="red";

l.setStyle({color,weight:5});
l.feature={type:"Feature",properties:{mode}};

drawnItems.addLayer(l);
saveToFirebase(l);
});

// IMAGE
function addImage(){
const input=document.getElementById("imgInput");

input.onchange=()=>{
const file=input.files[0];

map.once("click", async e=>{

const storageRef = ref(storage,"images/"+Date.now());
await uploadBytes(storageRef,file);
const url=await getDownloadURL(storageRef);

const bounds=[
[e.latlng.lat,e.latlng.lng],
[e.latlng.lat+0.01,e.latlng.lng+0.01]
];

const img=L.imageOverlay(url,bounds);

img.feature={
type:"Feature",
properties:{type:"image",url,bounds}
};

drawnItems.addLayer(img);
saveToFirebase(img);

});
};
}

// EXPORT
function exportGeo(){
const data=drawnItems.toGeoJSON();
console.log(JSON.stringify(data));
alert("GeoJSON console!");
}

// IMPORT
document.getElementById("geoInput").addEventListener("change",function(e){
const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(event){
const geojson=JSON.parse(event.target.result);

L.geoJSON(geojson,{
style:f=>{
if(f.properties?.mode==="good") return {color:"green"};
if(f.properties?.mode==="bad") return {color:"orange"};
if(f.properties?.mode==="blocked") return {color:"red"};
},
onEachFeature:(f,l)=>{
if(f.properties?.type==="image"){
const img=L.imageOverlay(f.properties.url,f.properties.bounds);
drawnItems.addLayer(img);
saveToFirebase(img);
}else{
drawnItems.addLayer(l);
saveToFirebase(l);
}
}
});
};

reader.readAsText(file);
});

// DELETE ALL
async function deleteAll(){
if(!confirm("Dzēst VISU?")) return;

const snap=await getDocs(refDB);

snap.forEach(async d=>{
await deleteDoc(d.ref);
});

drawnItems.clearLayers();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyC-IjqWrPmipV3KxHDO27lqun2ZaTaTdR0",
authDomain:"forest-map-2971b.firebaseapp.com",
projectId:"forest-map-2971b",
storageBucket:"forest-map-2971b.firebasestorage.app",
messagingSenderId:"123317579216",
appId:"1:123317579216:web:82362232f6b94b9fa31dd5"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);

const refDB=collection(db,"roads");

// LOAD
onSnapshot(refDB,snap=>{
drawnItems.clearLayers();

snap.forEach(doc=>{
const f=doc.data().geojson;

if(f.properties?.type==="image"){
const img=L.imageOverlay(f.properties.url,f.properties.bounds);
drawnItems.addLayer(img);
return;
}

const layer=L.geoJSON(f,{
style:x=>{
if(x.properties?.mode==="good") return {color:"green"};
if(x.properties?.mode==="bad") return {color:"orange"};
if(x.properties?.mode==="blocked") return {color:"red"};
}
});

layer.eachLayer(l=>drawnItems.addLayer(l));
});
});

// SAVE
window.saveToFirebase=async layer=>{
await addDoc(refDB,{
geojson:layer.toGeoJSON()
});
};

// expose
window.ref=ref;
window.uploadBytes=uploadBytes;
window.getDownloadURL=getDownloadURL;
window.storage=storage;
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.refDB=refDB;

</script>

</body>
</html>
