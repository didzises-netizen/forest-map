<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Forest Map ULTRA SIMPLE MOBILE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
html,body{margin:0;height:100%}
#map{height:100%}

/* ===== TOOLBAR (tavas pogas) ===== */
.toolbar{
position:absolute;
top:50%;
left:10px;
transform:translateY(-50%);
z-index:1000;
background:rgba(255,255,255,0.9);
padding:12px;
border-radius:14px;
width:150px;
}

button{
width:100%;
margin:8px 0;
padding:18px;
font-size:18px;
border-radius:10px;
}

/* ===== LEAFLET DRAW POGAS (tas ko gribēji) ===== */
.leaflet-top.leaflet-left {
left: 10px !important;
top: 50% !important;
transform: translateY(-50%);
}

.leaflet-control {
margin-bottom: 12px !important;
}

.leaflet-control a {
width: 65px !important;
height: 65px !important;
line-height: 65px !important;
font-size: 24px !important;
border-radius: 12px !important;
}

@media (max-width: 768px){
.leaflet-control a {
width: 75px !important;
height: 75px !important;
line-height: 75px !important;
font-size: 26px !important;
}
}
</style>
</head>

<body>

<div class="toolbar">
<button onclick="setMode('good')">🟢 Braucams</button>
<button onclick="setMode('bad')">🟠 Slikts</button>
<button onclick="setMode('blocked')">🔴 Bloķēts</button>
<button onclick="deleteAll()">🗑 Dzēst visu</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
// ================= MAP =================
const map=L.map('map',{tap:true}).setView([56.5,21],13);

const topo = L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?", {
layers: "public:Topo50",
format: "image/png"
});

const ortho = L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?", {
layers: "public:Ortofoto",
format: "image/png"
});

topo.addTo(map);

L.control.layers({
"Topo": topo,
"Ortofoto": ortho
}).addTo(map);

// STORAGE
window.drawnItems=new L.FeatureGroup();
map.addLayer(window.drawnItems);

// DEVICE
const isMobile = window.innerWidth < 768;

// COLOR
function getColor(mode){
if(mode==="good") return "green";
if(mode==="bad") return "orange";
if(mode==="blocked") return "red";
return "green";
}

// ================= MOBILE =================
let currentMode="good";
let firstPoint=null;

function setMode(m){
currentMode=m;
firstPoint=null;
}

map.on("click",e=>{
if(!isMobile) return;

if(!firstPoint){
firstPoint=[e.latlng.lat,e.latlng.lng];
L.circleMarker(firstPoint,{radius:6,color:"blue"}).addTo(map);
return;
}

const secondPoint=[e.latlng.lat,e.latlng.lng];

const line=L.polyline([firstPoint,secondPoint],{
color:getColor(currentMode),
weight:5
});

line.feature={properties:{mode:currentMode}};

drawnItems.addLayer(line);
saveToFirebase(line);

firstPoint=null;
});

// ================= DESKTOP =================
if(!isMobile){

const drawControl=new L.Control.Draw({
edit:{featureGroup:drawnItems},
draw:{
polygon:false,
polyline:true
}
});

map.addControl(drawControl);

map.on(L.Draw.Event.CREATED,e=>{
const l=e.layer;

l.setStyle({
color:getColor(currentMode),
weight:5
});

l.feature={properties:{mode:currentMode}};

drawnItems.addLayer(l);
saveToFirebase(l);
});

}

// ================= DELETE =================
async function deleteAll(){
if(!confirm("Dzēst visu?")) return;

const snap=await getDocs(refDB);

snap.forEach(async d=>{
await deleteDoc(d.ref);
});

drawnItems.clearLayers();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyC-IjqWrPmipV3KxHDO27lqun2ZaTaTdR0",
projectId:"forest-map-2971b"
});

const db=getFirestore(app);
const refDB=collection(db,"roads");

// REALTIME LOAD (NO REFRESH VAJADZĪGS)
onSnapshot(refDB,snap=>{
window.drawnItems.clearLayers();

snap.forEach(doc=>{
const data=doc.data();
if(!data.coords) return;

const coords=data.coords.map(p=>[p.lat,p.lng]);

const line=L.polyline(coords,{
color:(data.mode==="bad"?"orange":
data.mode==="blocked"?"red":"green"),
weight:5
});

window.drawnItems.addLayer(line);
});
});

// SAVE (FIX nested arrays)
window.saveToFirebase=async function(layer){

let latlngs=layer.getLatLngs();

// 🔥 FIX ja nested array (desktop)
if(Array.isArray(latlngs[0])){
latlngs = latlngs.flat();
}

const coords=latlngs.map(p=>({
lat:p.lat,
lng:p.lng
}));

await addDoc(refDB,{
coords:coords,
mode:layer.feature.properties.mode
});
};

window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.refDB=refDB;

</script>

</body>
</html>
