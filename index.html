<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Forest Road Mapper</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
html,body{
    margin:0;
    height:100%;
    font-family:sans-serif;
}

#map{
    width:100%;
    height:100%;
}

.toolbar{
    position:absolute;
    top:10px;
    right:10px;
    z-index:1000;
    width:260px;
}

.dropdown{
    background:white;
    margin-bottom:10px;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
    overflow:hidden;
}

.dropdown-header{
    padding:14px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
    background:#f0f0f0;
}

.dropdown-content{
    display:none;
    padding:10px;
}

.dropdown-content button,
.dropdown-content input{
    width:100%;
    margin-bottom:8px;
    padding:14px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

#coords{
    font-size:14px;
    margin-top:8px;
}

@media (max-width: 600px){
.toolbar{
    width:90%;
    left:5%;
    right:5%;
}
.dropdown-header{
    font-size:18px;
    padding:16px;
}
.dropdown-content button,
.dropdown-content input{
    font-size:18px;
    padding:16px;
}
.dropdown-content button{
    min-height:50px;
}
}
</style>
</head>

<body>

<div class="toolbar">

<div class="dropdown">
<div class="dropdown-header" onclick="toggle(this)">Ceļi</div>
<div class="dropdown-content">
<button onclick="roadType='good'">Braucama</button>
<button onclick="roadType='bad'">Slikti braucama</button>
<button onclick="roadType='blocked'">Neizbraucama</button>
<button onclick="addRoadEnd()">Ceļa gals</button>
</div>
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
function toggle(el){
const content = el.nextElementSibling;
content.style.display = content.style.display === "block" ? "none" : "block";
}

const map = L.map('map').setView([56.504,21.01],13);

L.tileLayer.wms(
"https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Topo50",
format:"image/png",
maxZoom:19
}).addTo(map);

let roadType="good";
const drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl=new L.Control.Draw({
edit:{featureGroup:drawnItems},
draw:{polygon:false,rectangle:false,circle:false,marker:false,circlemarker:false}
});
map.addControl(drawControl);

map.on(L.Draw.Event.CREATED,e=>{
const l=e.layer;

let c="green";
if(roadType==="bad") c="orange";
if(roadType==="blocked") c="red";

l.setStyle({color:c,weight:5});
l.feature={type:"Feature",properties:{roadType}};

drawnItems.addLayer(l);
saveToFirebase(l);
});

function addRoadEnd(){
map.once("click",e=>{
const m=L.circleMarker(e.latlng,{radius:8,color:"black",fillColor:"black",fillOpacity:1});
m.feature={type:"Feature",properties:{type:"road_end"}};
drawnItems.addLayer(m);
saveToFirebase(m);
});
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TEV_API_KEY",
  authDomain: "forest-map-2971b.firebaseapp.com",
  projectId: "forest-map-2971b",
  storageBucket: "forest-map-2971b.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const roadsRef = collection(db, "roads");

onSnapshot(roadsRef, (snapshot) => {
  drawnItems.clearLayers();

  snapshot.forEach(doc => {
    const data = doc.data();

    const layer = L.geoJSON(data.geojson, {
      style: f => {
        if(f.properties?.roadType==="good") return {color:"green",weight:5};
        if(f.properties?.roadType==="bad") return {color:"orange",weight:5};
        if(f.properties?.roadType==="blocked") return {color:"red",weight:5};
      },
      pointToLayer:(f,latlng)=>{
        if(f.properties?.type==="road_end")
          return L.circleMarker(latlng,{radius:8,color:"black",fillColor:"black",fillOpacity:1});
        return L.marker(latlng);
      }
    });

    layer.eachLayer(l=>drawnItems.addLayer(l));
  });
});

window.saveToFirebase = async function(layer){
  const geo = layer.toGeoJSON();

  await addDoc(roadsRef, {
    geojson: geo
  });
}
</script>

</body>
</html>
