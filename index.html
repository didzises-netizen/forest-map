<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Forest Map PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
body,html{margin:0;height:100%}
#map{height:100%}

.toolbar{
position:absolute;
top:10px;
right:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:10px;
width:260px;
}

button,input{
width:100%;
margin:5px 0;
padding:12px;
font-size:16px;
}
</style>
</head>

<body>

<div class="toolbar">

<button onclick="mode='good'">Braucams</button>
<button onclick="mode='bad'">Slikts</button>
<button onclick="mode='blocked'">Bloķēts</button>

<button onclick="addImage()">Pievienot bildi</button>

<button onclick="exportGeo()">Export GeoJSON</button>

<input type="file" id="imgInput">

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
const map=L.map('map').setView([56.5,21],13);

L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Topo50",
format:"image/png"
}).addTo(map);

let mode="good";

const drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl=new L.Control.Draw({
edit:{featureGroup:drawnItems},
draw:{
polygon:true,
polyline:true,
rectangle:false,
circle:false,
marker:false
}
});
map.addControl(drawControl);

map.on(L.Draw.Event.CREATED,e=>{
const l=e.layer;

let color="green";
if(mode==="bad") color="orange";
if(mode==="blocked") color="red";

l.setStyle({color,weight:5});
l.feature={type:"Feature",properties:{mode}};

drawnItems.addLayer(l);
saveToFirebase(l);
});

// IMAGE
function addImage(){
const input=document.getElementById("imgInput");

input.onchange=()=>{
const file=input.files[0];
const reader=new FileReader();

reader.onload=()=>{
map.once("click",e=>{
const img=L.imageOverlay(reader.result,[
[e.latlng.lat,e.latlng.lng],
[e.latlng.lat+0.01,e.latlng.lng+0.01]
]);
drawnItems.addLayer(img);
});
};

reader.readAsDataURL(file);
};
}

// EXPORT
function exportGeo(){
const data=drawnItems.toGeoJSON();
console.log(JSON.stringify(data));
alert("GeoJSON console!");
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TAVA_API_KEY",
  authDomain: "forest-map-2971b.firebaseapp.com",
  projectId: "forest-map-2971b",
  storageBucket: "forest-map-2971b.firebasestorage.app",
  messagingSenderId: "123317579216",
  appId: "1:123317579216:web:82362232f6b94b9fa31dd5"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const ref=collection(db,"roads");

// LOAD
onSnapshot(ref,snap=>{
drawnItems.clearLayers();

snap.forEach(doc=>{
const d=doc.data();

const layer=L.geoJSON(d.geojson,{
style:f=>{
if(f.properties?.mode==="good") return {color:"green"};
if(f.properties?.mode==="bad") return {color:"orange"};
if(f.properties?.mode==="blocked") return {color:"red"};
}
});

layer.eachLayer(l=>drawnItems.addLayer(l));
});
});

// SAVE
window.saveToFirebase=async function(layer){
await addDoc(ref,{
geojson:layer.toGeoJSON()
});
}
</script>

</body>
</html>
