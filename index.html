<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Forest Map FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
html,body{margin:0;height:100%}
#map{height:100%}

.toolbar{
position:absolute;
top:10px;
right:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:10px;
width:260px;
}

button{
width:100%;
margin:5px 0;
padding:14px;
font-size:16px;
}
</style>
</head>

<body>

<div class="toolbar" id="toolbar">

<button onclick="startDraw('good')">🟢 Braucams</button>
<button onclick="startDraw('bad')">🟠 Slikts</button>
<button onclick="startDraw('blocked')">🔴 Bloķēts</button>

<button onclick="finishDraw()">✔ Pabeigt</button>
<button onclick="cancelDraw()">❌ Atcelt</button>

<button onclick="deleteAll()">🗑 Dzēst visu</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
const map=L.map('map').setView([56.5,21],13);

// 🌲 LAYERS (FIXED)
const topo=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Topo50",
format:"image/png"
});

const ortho=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Ortofoto", // ja nestrādā → maini uz public:Orto
format:"image/png"
});

topo.addTo(map);

L.control.layers({
"Topo":topo,
"Ortofoto":ortho
}).addTo(map);

// STORAGE
const drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

// DEVICE DETECT
const isMobile = /Mobi|Android/i.test(navigator.userAgent);

// 🔥 COLOR (GLOBAL FIX)
window.getColor=function(mode){
if(mode==="good") return "green";
if(mode==="bad") return "orange";
if(mode==="blocked") return "red";
return "green";
};

// =====================
// 📱 MOBILE DRAW SYSTEM
// =====================
let drawing=false;
let currentLine=[];
let tempLine=null;

function startDraw(type){
if(!isMobile) return;
drawing=type;
currentLine=[];
if(tempLine){
map.removeLayer(tempLine);
tempLine=null;
}
}

map.on("click",e=>{
if(!isMobile) return;
if(!drawing) return;

currentLine.push([e.latlng.lat,e.latlng.lng]);

if(tempLine){
tempLine.setLatLngs(currentLine);
}else{
tempLine=L.polyline(currentLine,{
color:getColor(drawing),
weight:5
}).addTo(map);
}
});

function finishDraw(){
if(!isMobile) return;
if(!drawing||currentLine.length<2) return;

const line=L.polyline(currentLine,{
color:getColor(drawing),
weight:5
});

line.feature={type:"Feature",properties:{mode:drawing}};

drawnItems.addLayer(line);
saveToFirebase(line);

map.removeLayer(tempLine);
tempLine=null;
currentLine=[];
drawing=false;
}

function cancelDraw(){
if(!isMobile) return;
if(tempLine) map.removeLayer(tempLine);
tempLine=null;
currentLine=[];
drawing=false;
}

// =====================
// 💻 DESKTOP DRAW (OLD UI)
// =====================
if(!isMobile){

document.getElementById("toolbar").style.display="none";

const drawControl=new L.Control.Draw({
edit:{featureGroup:drawnItems},
draw:{
polygon:true,
polyline:true,
rectangle:false,
circle:false,
marker:false
}
});
map.addControl(drawControl);

map.on(L.Draw.Event.CREATED,e=>{
const l=e.layer;

l.setStyle({color:getColor("good"),weight:5});
l.feature={type:"Feature",properties:{mode:"good"}};

drawnItems.addLayer(l);
saveToFirebase(l);
});

}

// DELETE
async function deleteAll(){
if(!confirm("Dzēst visu?")) return;

const snap=await getDocs(refDB);

snap.forEach(async d=>{
await deleteDoc(d.ref);
});

drawnItems.clearLayers();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyC-IjqWrPmipV3KxHDO27lqun2ZaTaTdR0",
authDomain:"forest-map-2971b.firebaseapp.com",
projectId:"forest-map-2971b"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const refDB=collection(db,"roads");

// 🔥 LOAD (FIXED SAFE VERSION)
onSnapshot(refDB,snap=>{
drawnItems.clearLayers();

snap.forEach(doc=>{
const data=doc.data();
if(!data.geojson) return;

const f=data.geojson;

const coords=f.geometry.coordinates.map(c=>[c[1],c[0]]);

const line=L.polyline(coords,{
color:window.getColor(f.properties.mode),
weight:5
});

drawnItems.addLayer(line);
});
});

// SAVE
window.saveToFirebase=async layer=>{
await addDoc(refDB,{
geojson:layer.toGeoJSON()
});
};

// expose
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.refDB=refDB;

</script>

</body>
</html>
