<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Forest Map Mobile</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%}
#map{height:100%}

/* TOOLBAR */
.toolbar{
position:absolute;
top:10px;
right:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:10px;
width:260px;
}

button,input{
width:100%;
margin:5px 0;
padding:16px;
font-size:18px;
}
</style>
</head>

<body>

<div class="toolbar">

<button onclick="startDraw('good')">🟢 Braucams</button>
<button onclick="startDraw('bad')">🟠 Slikts</button>
<button onclick="startDraw('blocked')">🔴 Bloķēts</button>

<button onclick="finishDraw()">✔ Pabeigt</button>
<button onclick="cancelDraw()">❌ Atcelt</button>

<button onclick="addImage()">🖼 Bilde</button>

<button onclick="deleteAll()">🗑 Dzēst visu</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([56.5,21],13);

// LAYERS
const topo=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Topo50",
format:"image/png"
});

const ortho=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Ortofoto",
format:"image/png"
});

topo.addTo(map);

L.control.layers({
"Topo":topo,
"Ortofoto":ortho
}).addTo(map);

// STORAGE
const drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

// DRAW SYSTEM
let drawing=false;
let currentLine=[];
let tempLine=null;

function startDraw(type){
drawing=type;
currentLine=[];

if(tempLine){
map.removeLayer(tempLine);
tempLine=null;
}
}

map.on("click",e=>{
if(!drawing) return;

currentLine.push([e.latlng.lat,e.latlng.lng]);

if(tempLine){
tempLine.setLatLngs(currentLine);
}else{
tempLine=L.polyline(currentLine,{
color:getColor(drawing),
weight:5
}).addTo(map);
}
});

function finishDraw(){
if(!drawing||currentLine.length<2) return;

const line=L.polyline(currentLine,{
color:getColor(drawing),
weight:5
});

line.feature={
type:"Feature",
properties:{mode:drawing}
};

drawnItems.addLayer(line);
saveToFirebase(line);

map.removeLayer(tempLine);
tempLine=null;
currentLine=[];
drawing=false;
}

function cancelDraw(){
if(tempLine) map.removeLayer(tempLine);
tempLine=null;
currentLine=[];
drawing=false;
}

function getColor(mode){
if(mode==="good") return "green";
if(mode==="bad") return "orange";
if(mode==="blocked") return "red";
}

// IMAGE
function addImage(){
const input=document.createElement("input");
input.type="file";

input.onchange=()=>{
const file=input.files[0];

map.once("click", async e=>{

const storageRef=ref(storage,"img/"+Date.now());
await uploadBytes(storageRef,file);
const url=await getDownloadURL(storageRef);

const bounds=[
[e.latlng.lat,e.latlng.lng],
[e.latlng.lat+0.01,e.latlng.lng+0.01]
];

const img=L.imageOverlay(url,bounds);

img.feature={
type:"Feature",
properties:{type:"image",url,bounds}
};

drawnItems.addLayer(img);
saveToFirebase(img);

});
};

input.click();
}

// DELETE
async function deleteAll(){
if(!confirm("Dzēst visu?")) return;

const snap=await getDocs(refDB);

snap.forEach(async d=>{
await deleteDoc(d.ref);
});

drawnItems.clearLayers();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyC-IjqWrPmipV3KxHDO27lqun2ZaTaTdR0",
authDomain:"forest-map-2971b.firebaseapp.com",
projectId:"forest-map-2971b",
storageBucket:"forest-map-2971b.firebasestorage.app",
messagingSenderId:"123317579216",
appId:"1:123317579216:web:82362232f6b94b9fa31dd5"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);

const refDB=collection(db,"roads");

// LOAD
onSnapshot(refDB,snap=>{
drawnItems.clearLayers();

snap.forEach(doc=>{
const f=doc.data().geojson;

if(f.properties?.type==="image"){
const img=L.imageOverlay(f.properties.url,f.properties.bounds);
drawnItems.addLayer(img);
return;
}

const line=L.polyline(f.geometry.coordinates.map(c=>[c[1],c[0]]),{
color:getColor(f.properties.mode),
weight:5
});

drawnItems.addLayer(line);
});
});

// SAVE
window.saveToFirebase=async layer=>{
await addDoc(refDB,{
geojson:layer.toGeoJSON()
});
};

// expose
window.ref=ref;
window.uploadBytes=uploadBytes;
window.getDownloadURL=getDownloadURL;
window.storage=storage;
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.refDB=refDB;

</script>

</body>
</html>
