<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Forest Map FIXED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
html,body{margin:0;height:100%}
#map{height:100%}

/* toolbar */
.toolbar{
position:absolute;
top:10px;
right:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:10px;
width:250px;
}

button{
width:100%;
margin:5px 0;
padding:14px;
font-size:16px;
}
</style>
</head>

<body>

<div class="toolbar" id="toolbar">

<button onclick="setMode('good')">🟢 Braucams</button>
<button onclick="setMode('bad')">🟠 Slikts</button>
<button onclick="setMode('blocked')">🔴 Bloķēts</button>

<button onclick="finishDraw()">✔ Pabeigt</button>
<button onclick="cancelDraw()">❌ Atcelt</button>

<button onclick="deleteAll()">🗑 Dzēst visu</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
// ================= MAP =================
const map=L.map('map',{tap:true}).setView([56.5,21],13);

// 🌲 LAYERS (FIXED)
const topo=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Topo50",
format:"image/png"
});

const ortho=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Orto",
format:"image/png"
});

topo.addTo(map);

L.control.layers({
"Topo":topo,
"Orto (īstais skats)":ortho
}).addTo(map);

// STORAGE (GLOBAL)
window.drawnItems=new L.FeatureGroup();
map.addLayer(window.drawnItems);

// DEVICE
const isMobile = window.innerWidth < 768;

// COLOR
function getColor(mode){
if(mode==="good") return "green";
if(mode==="bad") return "orange";
if(mode==="blocked") return "red";
return "green";
}

// ================= MOBILE =================
let drawing=false;
let currentLine=[];
let tempLine=null;
let currentMode="good";

function setMode(m){
currentMode=m;
if(isMobile) startDraw();
}

function startDraw(){
drawing=true;
currentLine=[];
if(tempLine){
map.removeLayer(tempLine);
tempLine=null;
}
}

// 🔥 FIXED TOUCH PRECISION
map.on("touchstart click", function(e){
if(!isMobile || !drawing) return;

const latlng = e.latlng;

currentLine.push([latlng.lat,latlng.lng]);

if(tempLine){
tempLine.setLatLngs(currentLine);
}else{
tempLine=L.polyline(currentLine,{
color:getColor(currentMode),
weight:5
}).addTo(map);
}
});

function finishDraw(){
if(!drawing||currentLine.length<2) return;

const line=L.polyline(currentLine,{
color:getColor(currentMode),
weight:5
});

line.feature={type:"Feature",properties:{mode:currentMode}};

drawnItems.addLayer(line);
saveToFirebase(line);

map.removeLayer(tempLine);
tempLine=null;
currentLine=[];
drawing=false;
}

function cancelDraw(){
if(tempLine) map.removeLayer(tempLine);
tempLine=null;
currentLine=[];
drawing=false;
}

// ================= DESKTOP =================
if(!isMobile){

const drawControl=new L.Control.Draw({
edit:{featureGroup:drawnItems},
draw:{
polygon:false,
polyline:true
}
});
map.addControl(drawControl);

map.on(L.Draw.Event.CREATED,e=>{
const l=e.layer;

l.setStyle({
color:getColor(currentMode),
weight:5
});

l.feature={type:"Feature",properties:{mode:currentMode}};

drawnItems.addLayer(l);
saveToFirebase(l);
});

}

// ================= DELETE =================
async function deleteAll(){
if(!confirm("Dzēst visu?")) return;

const snap=await getDocs(refDB);

snap.forEach(async d=>{
await deleteDoc(d.ref);
});

drawnItems.clearLayers();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyC-IjqWrPmipV3KxHDO27lqun2ZaTaTdR0",
projectId:"forest-map-2971b"
});

const db=getFirestore(app);
const refDB=collection(db,"roads");

// 🔥 SYNC FIX (STRĀDĀ)
onSnapshot(refDB,snap=>{
window.drawnItems.clearLayers();

snap.forEach(doc=>{
const data=doc.data();
if(!data.geojson) return;

const f=data.geojson;

const coords=f.geometry.coordinates.map(c=>[c[1],c[0]]);

const line=L.polyline(coords,{
color:(f.properties.mode==="bad"?"orange":
       f.properties.mode==="blocked"?"red":"green"),
weight:5
});

window.drawnItems.addLayer(line);
});
});

// SAVE
window.saveToFirebase=async layer=>{
await addDoc(refDB,{
geojson:layer.toGeoJSON()
});
};

// expose
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.refDB=refDB;

</script>

</body>
</html>
