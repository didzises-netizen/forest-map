<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Forest Map CLEAN UI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%}
#map{height:100%}

/* ===== BOTTOM PANEL ===== */
.panel{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:rgba(255,255,255,0.95);
padding:12px;
border-radius:16px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
box-shadow:0 4px 20px rgba(0,0,0,0.2);
}

/* pogas */
.btn{
padding:14px 18px;
font-size:16px;
border:none;
border-radius:10px;
background:#eee;
}

.btn.active{
outline:3px solid black;
}

.btn.big{
font-size:18px;
padding:16px 22px;
}

/* zoom tikai augšā */
.leaflet-top.leaflet-left{
top:10px !important;
left:10px !important;
}

/* mobile */
@media (max-width:768px){
.btn{
font-size:18px;
padding:18px;
}
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<button class="btn" onclick="setMode('good')" id="b_good">🟢</button>
<button class="btn" onclick="setMode('bad')" id="b_bad">🟠</button>
<button class="btn" onclick="setMode('blocked')" id="b_blocked">🔴</button>

<button class="btn big" onclick="startDraw()">✏️ Zīmēt</button>
<button class="btn" onclick="cancelDraw()">❌</button>
<button class="btn" onclick="deleteAll()">🗑</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAP
const map=L.map('map').setView([56.5,21],13);

// LAYERS
const topo=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Topo50",
format:"image/png"
});

const ortho=L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows?",{
layers:"public:Ortofoto",
format:"image/png"
});

topo.addTo(map);

L.control.layers({
"Topo":topo,
"Ortofoto":ortho
}).addTo(map);

// STORAGE
const drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

// STATE
let mode="good";
let drawing=false;
let firstPoint=null;

// MODE
function setMode(m){
mode=m;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));

if(m==="good") document.getElementById("b_good").classList.add("active");
if(m==="bad") document.getElementById("b_bad").classList.add("active");
if(m==="blocked") document.getElementById("b_blocked").classList.add("active");
}

// DRAW CONTROL
function startDraw(){
drawing=true;
firstPoint=null;
}

function cancelDraw(){
drawing=false;
firstPoint=null;
}

// COLOR
function getColor(){
if(mode==="good") return "green";
if(mode==="bad") return "orange";
if(mode==="blocked") return "red";
}

// CLICK DRAW (gan mobile gan desktop)
map.on("click",e=>{
if(!drawing) return;

if(!firstPoint){
firstPoint=[e.latlng.lat,e.latlng.lng];
L.circleMarker(firstPoint,{radius:6}).addTo(map);
return;
}

const second=[e.latlng.lat,e.latlng.lng];

const line=L.polyline([firstPoint,second],{
color:getColor(),
weight:5
});

drawnItems.addLayer(line);
saveToFirebase(line);

firstPoint=null;
drawing=false;
});

// DELETE
async function deleteAll(){
if(!confirm("Dzēst visu?")) return;

const snap=await getDocs(refDB);

snap.forEach(async d=>{
await deleteDoc(d.ref);
});

drawnItems.clearLayers();
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyC-IjqWrPmipV3KxHDO27lqun2ZaTaTdR0",
projectId:"forest-map-2971b"
});

const db=getFirestore(app);
const refDB=collection(db,"roads");

// REALTIME
onSnapshot(refDB,snap=>{
drawnItems.clearLayers();

snap.forEach(doc=>{
const d=doc.data();
if(!d.coords) return;

const coords=d.coords.map(p=>[p.lat,p.lng]);

L.polyline(coords,{
color:(d.mode==="bad"?"orange":
d.mode==="blocked"?"red":"green"),
weight:5
}).addTo(drawnItems);
});
});

// SAVE
window.saveToFirebase=async function(layer){

const coords=layer.getLatLngs().map(p=>({
lat:p.lat,
lng:p.lng
}));

await addDoc(refDB,{
coords:coords,
mode:mode
});
};

window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.refDB=refDB;

</script>

</body>
</html>
